<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Styled To-Do List</title>
    </head>
    <body>
        <div>
        <h1>My To Do List</h1>
        <ul class="todo-list">
            <li>
            <input type="checkbox" id="gaming">
            <label for="gaming">Explore gaming keyboards
                </label>
                <ul class="sub-item">
                    <li>
                    <a class="sub-item-link" href="https://ww.freecodecamp.org" target="_blank">
                       Store link </a>
                    </li>
                </ul>
            </li>
              <li>
            <input type="checkbox" id="report">
            <label for="report">Finish the report
                </label>
                <ul class="sub-item">
                    <li>
                    <a class="sub-item-link" href="https://ww.freecodecamp.org" target="_blank">
                        Request Access</a>
                    </li>
                </ul>
            </li>
              <li>
            <input type="checkbox" id="warranty">
            <label for="gaming">View Phone's Warranty
                </label>
                <ul class="sub-item">
                    <li>
                    <a class="sub-item-link" href="https://ww.freecodecamp.org" target="_blank">
                        View Reciepts</a>
                    </li>
                </ul>
            </li>
              <li>
            <input type="checkbox" id="specs">
            <label for="gaming">Check Processor Specs
                </label>
                <ul class="sub-item">
                    <li>
                    <a class="sub-item-link" href="https://ww.freecodecamp.org" target="_blank">
                        View Model Number</a>
                    </li>
                </ul>
            </li>
            </ul></div>
    </body>
</html>
